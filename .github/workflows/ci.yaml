name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.x'
          check-latest: true

      - name: Build
        run: go build -v ./...

  unit-test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.21.0', 'latest' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go == 'latest' && '1.x' || matrix.go }}
          check-latest: true

      - name: Test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      # Upload coverage to Codecov
      # - name: Upload coverage to Codecov
      #   if: ${{ matrix.go == 'latest' }}
      #   uses: codecov/codecov-action@v6
      #   with:
      #     files: coverage.txt
      #     fail_ci_if_error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.x'
          check-latest: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
